<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Diya Pharma</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="stylesheet" href="css/cart.css?v=4">
  <link rel="stylesheet" href="css/responsive.css?v=4">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💊</text></svg>">
  <style>
    /* Recommended Section */
    .rec-section { margin-top: var(--space-12); padding-top: var(--space-8); border-top: 1px solid var(--neutral-200); }
    .rec-title { text-align: center; margin-bottom: var(--space-6); color: #001F5B; font-size: var(--text-2xl); }
    .rec-grid { display: flex; gap: var(--space-6); justify-content: center; flex-wrap: wrap; }
    .rec-card { display: flex; flex-direction: column; align-items: center; text-decoration: none; width: 130px; transition: transform 0.3s ease; }
    .rec-card:hover { transform: translateY(-5px); }
    .rec-img-wrap {
      width: 110px; height: 110px; border-radius: 50%; background: #f8f9fc;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      margin-bottom: var(--space-3); border: 2px solid var(--neutral-200);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .rec-img-wrap img { width: 75%; height: 75%; object-fit: contain; }
    .rec-name { font-size: 11px; text-align: center; color: var(--neutral-800); font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>
<header class="header"><div class="container">
  <a href="index.html" class="logo"><div class="logo-icon">D</div><span>Diya Pharma</span></a>
  <nav class="nav-links"><a href="index.html">Home</a><a href="products.html">Products</a><a href="about.html">About Us</a><a href="contact.html">Contact</a></nav>
  <div class="nav-actions"><a href="cart.html" class="nav-cart" style="color:var(--primary-600)">🛒<span class="cart-badge cart-count" style="display:none">0</span></a><a href="login.html" class="btn btn-sm btn-secondary">Login</a></div>
  <button class="menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
</div></header>
<nav class="mobile-nav" id="mobileNav"><a href="index.html">Home</a><a href="products.html">Products</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav>
<main>
<section class="container cart-section">
  <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Cart</span></div>
  <h1 style="margin-bottom:var(--space-8)">Shopping Cart</h1>
  <div id="cartContent"></div>
  
  <!-- Recommended Products -->
  <div class="rec-section" id="recommendedSection" style="display:none;">
    <h3 class="rec-title">Recommended for You</h3>
    <div class="rec-grid" id="recGrid"></div>
  </div>
</section>
</main>
<footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2024 Diya Pharma. All rights reserved.</span></div></div></footer>
<script src="js/products.js?v=4"></script>
<script src="js/app.js?v=4"></script>
<script>
function renderCart() {
  const el = document.getElementById('cartContent');
  if (DiyaPharma.cart.length === 0) {
    el.innerHTML = `<div class="cart-empty"><div style="font-size:80px;margin-bottom:24px">🛒</div><h2>Your cart is empty</h2><p>Browse our product catalogue and add items to your cart.</p><a href="products.html" class="btn btn-primary btn-lg">Browse Products</a></div>`;
    return;
  }
  const subtotal = DiyaPharma.getCartTotal();
  const gst = subtotal * 0.12;
  const shipping = subtotal > 5000 ? 0 : 99;
  const total = subtotal + gst + shipping;
  let rows = DiyaPharma.cart.map(item => `
    <tr>
      <td><div class="cart-item-info"><div class="cart-item-img" style="overflow:hidden; display:flex; align-items:center; justify-content:center;">${item.img ? `<img src="${item.img}" style="width:100%; height:100%; object-fit:contain;">` : '💊'}</div><div><div class="cart-item-name">${item.name}</div><div class="cart-item-comp">${item.composition ? item.composition.substring(0,40) : ''}...</div></div></div></td>
      <td>₹${item.mrp.toFixed(2)}</td>
      <td><div class="cart-qty"><button onclick="updateCartItem(${item.id},-1)">−</button><input type="number" value="${item.qty}" min="1" onchange="setCartItem(${item.id},this.value)"><button onclick="updateCartItem(${item.id},1)">+</button></div></td>
      <td style="font-weight:700">₹${(item.mrp * item.qty).toFixed(2)}</td>
      <td><span class="cart-remove" onclick="removeCartItem(${item.id})">✕</span></td>
    </tr>`).join('');
  el.innerHTML = `
    <div class="cart-layout">
      <div class="cart-items"><table class="cart-table">
        <thead><tr><th>Product</th><th>Price</th><th>Quantity</th><th>Subtotal</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toFixed(2)}</span></div>
        <div class="summary-row"><span>GST (12%)</span><span>₹${gst.toFixed(2)}</span></div>
        <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:var(--success)">FREE</span>' : '₹'+shipping.toFixed(2)}</span></div>
        ${shipping > 0 ? '<div style="font-size:12px;color:var(--neutral-400);margin-bottom:8px">Free shipping on orders above ₹5,000</div>' : ''}
        <div class="summary-row total"><span>Total</span><span>₹${total.toFixed(2)}</span></div>
        <a href="checkout.html" class="btn btn-primary btn-lg w-full" style="margin-top:var(--space-5)">Proceed to Checkout</a>
        <a href="products.html" class="btn btn-secondary w-full" style="margin-top:var(--space-3)">Continue Shopping</a>
      </div>
    </div>`;
}
function updateCartItem(id, delta) { const item = DiyaPharma.cart.find(i=>i.id===id); if(item){item.qty=Math.max(1,item.qty+delta);DiyaPharma.saveCart();renderCart();} }
function setCartItem(id, val) { const item = DiyaPharma.cart.find(i=>i.id===id); if(item){item.qty=Math.max(1,parseInt(val)||1);DiyaPharma.saveCart();renderCart();} }
function removeCartItem(id) { DiyaPharma.removeFromCart(id); renderCart(); showToast('Item removed from cart','warning'); }

async function loadRecommendations() {
  try {
    const res = await fetch(`${CONFIG.API_BASE_URL}/diaper-products`);
    const products = await res.json();
    if (products && products.length > 0) {
      const shuffled = products.sort(() => 0.5 - Math.random()).slice(0, 5);
      const recGrid = document.getElementById('recGrid');
      recGrid.innerHTML = shuffled.map(p => `
        <a href="diaper-detail.html?id=${p.id}" class="rec-card">
          <div class="rec-img-wrap">
            ${p.image_main ? `<img src="${p.image_main}" alt="${p.name}">` : `<span style="font-size:40px;opacity:0.3">🩲</span>`}
          </div>
          <div class="rec-name">${p.name}</div>
        </a>
      `).join('');
      document.getElementById('recommendedSection').style.display = 'block';
    }
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  renderCart();
  loadRecommendations();
});
</script>
</body>
</html>
